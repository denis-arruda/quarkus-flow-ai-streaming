quarkus.application.name=frontend-web
quarkus.http.port=8081

# Kafka — publish content requests
mp.messaging.outgoing.flow-in.connector=smallrye-kafka
mp.messaging.outgoing.flow-in.topic=flow-in
mp.messaging.outgoing.flow-in.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka — consume pipeline results
mp.messaging.incoming.flow-out.connector=smallrye-kafka
mp.messaging.incoming.flow-out.topic=flow-out
mp.messaging.incoming.flow-out.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Observability
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
