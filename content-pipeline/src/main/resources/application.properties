quarkus.application.name=content-pipeline

# Quarkus Flow — messaging bridge
quarkus.flow.messaging.defaults-enabled=true
mp.messaging.incoming.flow-in.connector=smallrye-kafka
mp.messaging.incoming.flow-in.topic=content-published
mp.messaging.incoming.flow-in.value.deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer
mp.messaging.outgoing.flow-out.connector=smallrye-kafka
mp.messaging.outgoing.flow-out.topic=ai-content-finalized
mp.messaging.outgoing.flow-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Quarkus Flow — debug
quarkus.log.category."io.quarkiverse.flow".level=DEBUG
quarkus.log.category."io.quarkiverse.flow.deployment".level=DEBUG
quarkus.log.category."io.serverlessworkflow".level=DEBUG
quarkus.log.category."dev.langchain4j".level=DEBUG
quarkus.log.category."io.quarkus.redis".level=DEBUG
quarkus.log.category."io.vertx.redis".level=DEBUG
quarkus.log.category."io.smallrye.reactive.messaging".level=DEBUG

# Quarkus Flow — Redis persistence
quarkus.redis.hosts=redis://localhost:6379

# AI — OpenAI
quarkus.langchain4j.openai.api-key=${LLM_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini

# Observability
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# Dev mode overrides
%dev.kafka.bootstrap.servers=localhost:9094
%dev.quarkus.kafka.devservices.enabled=false
%dev.quarkus.redis.devservices.enabled=false

# Container image
quarkus.container-image.group=denisarruda
quarkus.container-image.name=content-pipeline
quarkus.container-image.tag=${quarkus.application.version:latest}
quarkus.jib.base-jvm-image=eclipse-temurin:26-jre
